name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install npm dependencies (playwright + esbuild + serve)
      - name: Install dependencies
        run: npm ci

      # 4. Verify the JS bundle builds without errors
      - name: Build bundle
        run: npm run build

      # 5. Install Chromium for headless browser tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 6. Run all Playwright tests
      - name: Run tests
        run: npm test

      # 7. Upload HTML test report as artifact (downloadable from Actions UI)
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
